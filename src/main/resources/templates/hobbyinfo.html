<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hobby Detail</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body>
<div class="detail-container">
    <h1 class="detail-title" th:text="${hobby.name}">Hobby</h1>

    <div class="detail-grid">
        <div class="detail-row">
            <span class="detail-label">ID:</span>
            <span th:text="${hobby.id}"></span>
        </div>
        <div class="detail-row">
            <span class="detail-label">Name:</span>
            <span th:text="${hobby.name}"></span>
        </div>
    </div>

    <div class="page-nav">
        <a class="nav-btn" href="/villagers">Villagers</a>
        <a class="nav-btn" href="/islands">Islands</a>
        <a class="nav-btn" href="/hobbies">Hobbies</a>
    </div>
</div>
</body>
</html>
