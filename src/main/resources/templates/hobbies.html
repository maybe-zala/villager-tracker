<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hobbies</title>
    <link rel="stylesheet" th:href="@{/style.css}" />
</head>
<body>
<div class="container">
    <h1>All Hobbies</h1>

    <a href="/hobbies/new" class="add-button">Add New Hobby</a>

    <table>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Actions</th>
        </tr>
        <tr th:each="hobby : ${hobbies}">
            <td th:text="${hobby.id}"></td>
            <td th:text="${hobby.name}"></td>
            <td>
                <a th:href="@{/hobbies/{id}(id=${hobby.id})}" class="table">View</a>
                <a th:href="@{/hobbies/{id}/edit(id=${hobby.id})}" class="table">Edit</a>
                <form th:action="@{/hobbies/{id}/delete(id=${hobby.id})}" method="post" style="display:inline;">
                    <button type="submit">Delete</button>
                </form>
            </td>
        </tr>
    </table>

    <div class="page-nav">
        <a class="nav-btn" href="/villagers">Villagers</a>
        <a class="nav-btn" href="/islands">Islands</a>
        <a class="nav-btn" href="/hobbies">Hobbies</a>
    </div>
</div>
</body>
</html>
